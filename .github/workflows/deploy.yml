name: Deploy Backend

on:
  push:
    branches: [main, develop, release]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: microsoft-student-community-qcu/qcu-msc-cicd/.github/workflows/deploy-azure-function-node.yml@main
    with:
      node-version: '20'
      build-command: 'npm run build'
      package-path: '.'
    secrets:
      azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
